name: Deploy website (GitHub Pages)

on:
  push:
    branches: [website-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build website
        env:
          GITHUB_PAGES: 'true'
          GITHUB_PAGES_OWNER: acrogenesis
          GITHUB_PAGES_REPO: herdr
        run: cd website && bun install --frozen-lockfile && bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4